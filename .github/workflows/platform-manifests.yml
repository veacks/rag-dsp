name: Platform Manifests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-platform-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and render platform manifests
        run: npm run -w @dsprag/skill-assets ci:platform-manifests
